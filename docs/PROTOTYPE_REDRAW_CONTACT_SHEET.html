<!doctype html>
<html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>V0.55.2 Prototype Redraw Contact Sheet</title>
<style>body{margin:0;padding:24px;background:#2f211b;color:#f7ead5;font-family:system-ui,sans-serif}h1{margin-top:0}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(330px,1fr));gap:16px}.card{background:#4a3328;border:1px solid #8b6a51;border-radius:14px;padding:12px}.images{display:grid;grid-template-columns:96px repeat(4,1fr);gap:6px;align-items:end;background:linear-gradient(30deg,#584034 25%,#4c382f 25% 50%,#584034 50% 75%,#4c382f 75%);background-size:16px 16px;padding:8px;border-radius:10px}.images img{max-width:100%;max-height:150px;object-fit:contain;image-rendering:pixelated}.old{background:#fff;border-radius:8px}small{color:#d8bea4}code{color:#bfe0bc}</style>
</head><body><h1>V0.55.2-alpha Prototype 家具前後對照</h1><p>左：V0.55.1 舊 SVG；右：V0.55.2 四方向透明 PNG。此文件僅供美術稽核，不被正式遊戲載入。</p><main class="grid" id="grid"></main>
<script>const ids=['squareCafeTable','windowHighChair','wallBench','catEarChair','creamSofa','pawSofa','cardboardNest','scratchPost','windowHammock','doubleCatTree','catTent','catCastle','coffeeMachine','oven','washStation','smartOrder','pawRug','creamPlaidRug','starNightRug','welcomeSign','dryFlower','monsterPlant','photoBackdrop','aquarium','childrenPlayArea'];const directions=['down-right','down-left','up-right','up-left'];document.querySelector('#grid').innerHTML=ids.map(id=>`<article class="card"><b>${id}</b><div class="images"><img class="old" src="../assets/furniture/${id}.svg" alt="old ${id}">${directions.map(direction=>`<img src="../assets/furniture/redrawn/${id}/${id}-${direction}.png?v=0552a" alt="${id} ${direction}">`).join('')}</div><small>old SVG → <code>down-right / down-left / up-right / up-left</code></small></article>`).join('');</script>
</body></html>
